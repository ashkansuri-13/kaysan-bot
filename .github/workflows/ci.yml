name: Kaysan Bot CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint with ruff
        continue-on-error: true
        run: |
          ruff check bot/ web/ --select E,F,W --ignore E501,E402,E741,F401,F811,F841,F541 --exit-zero

      - name: Run tests
        env:
          BOT_TOKEN: "test:fake"
          OPENROUTER_KEY: "fake_key"
        run: |
          python -m pytest tests/ -v --tb=short -x -q --ignore=tests/test_providers.py --ignore=tests/test_providers_full.py -k "not providers"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /root/kaysan-bot
            git pull origin main
            systemctl restart kaysan-bot

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Kaysan AI — دستیار هوشمند</title>
  <meta name="description" content="Kaysan AI — دستیار هوشمند چندزبانه تلگرام با ۵۰+ قابلیت">
  <meta name="theme-color" content="#818cf8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta property="og:title" content="Kaysan AI — دستیار هوشمند">
  <meta property="og:description" content="دستیار هوشمند چندزبانه تلگرام">
  <meta property="og:image" content="/logo.png">
  <link rel="icon" href="/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=400">
</head>
<body>
  <div id="app">
    <noscript><div style="text-align:center;padding:40px;color:#fafafa;background:#09090b;min-height:100vh;font-family:Inter,sans-serif;"><h1>Kaysan AI</h1><p>جاوااسکریپت را فعال کنید.</p></div></noscript>
    <canvas id="particles" class="particles-canvas"></canvas>
    <div id="loading-screen" class="loading-screen"><div class="loading-content"><div class="loading-logo"><img src="/logo.png" alt="Kaysan" class="loading-logo-img"><div class="loading-glow"></div></div><div class="loading-text">Kaysan AI</div><div class="loading-bar"><div class="loading-progress"></div></div><div class="loading-status">در حال بارگذاری...</div></div></div>

    <header class="header" id="header">
      <div class="header-l"><div class="brand"><div class="brand-icon animated-logo"><img src="/logo.png" alt="Kaysan" class="brain-emoji"><div class="logo-ring"></div></div><div class="brand-text"><div class="brand-name">Kaysan AI <span style="font-size:10px;color:var(--text-muted)">v4.0</span></div><div class="brand-status"><span class="status-dot pulse"></span><span id="status-text">آنلاین</span><span id="user-greeting" class="user-greeting"></span></div></div></div></div>
      <div class="header-r">
        <button id="new-chat-btn" class="icon-btn ripple" title="جدید"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
        <button id="history-btn" class="icon-btn ripple" title="تاریخچه"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg></button>
        <button id="personality-toggle" class="icon-btn ripple" title="شخصیت"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></button>
        <button id="theme-toggle" class="icon-btn ripple" title="تم"><svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <button id="settings-btn" class="icon-btn ripple" title="تنظیمات"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      </div>
    </header>

    <aside id="personality-panel" class="sidebar glass">
      <div class="sidebar-head"><h2>تنظیمات شخصیت</h2><button id="sidebar-close" class="icon-btn-sm">✕</button></div>
      <div class="sidebar-body">
        <div class="group"><div class="group-label">حالت پیش‌فرض</div><div id="preset-list" class="preset-grid"></div></div>
        <div class="group"><div class="group-label">پرامپت سفارشی</div><textarea id="custom-prompt" class="textarea" rows="3" placeholder="مثلاً: تو یه دوست صمیمی هستی..."></textarea></div>
        <div class="group"><button id="save-btn" class="btn-primary ripple">ذخیره</button><button id="reset-btn" class="btn-ghost">بازنشانی</button></div>
      </div>
    </aside>

    <aside id="history-panel" class="sidebar sidebar-left glass">
      <div class="sidebar-head"><h2>تاریخچه</h2><button id="history-close" class="icon-btn-sm">✕</button></div>
      <div class="sidebar-body"><div id="conversations-list" class="conversations-list"></div></div>
    </aside>

    <aside id="settings-panel" class="sidebar sidebar-left glass">
      <div class="sidebar-head"><h2>تنظیمات</h2><button id="settings-close" class="icon-btn-sm">✕</button></div>
      <div class="sidebar-body">
        <div class="group"><div class="group-label">زبان</div><div id="lang-selector" class="lang-selector"><button class="lang-btn active" data-lang="ku">کوردی</button><button class="lang-btn" data-lang="fa">فارسی</button><button class="lang-btn" data-lang="en">English</button></div></div>
        <div class="group"><div class="group-label">صدا</div><div class="toggle-row"><span>ورودی صوتی</span><label class="toggle"><input type="checkbox" id="voice-input-toggle"><span class="toggle-slider"></span></label></div><div class="toggle-row"><span>خروجی صوتی</span><label class="toggle"><input type="checkbox" id="voice-output-toggle"><span class="toggle-slider"></span></label></div></div>
        <div class="group"><div class="group-label">پیشرفته</div><div class="toggle-row"><span>استریمینگ</span><label class="toggle"><input type="checkbox" id="streaming-toggle" checked><span class="toggle-slider"></span></label></div><div class="toggle-row"><span>افکت ذرات</span><label class="toggle"><input type="checkbox" id="particles-toggle" checked><span class="toggle-slider"></span></label></div><div class="toggle-row"><span>صداهای افکت</span><label class="toggle"><input type="checkbox" id="sounds-toggle" checked><span class="toggle-slider"></span></label></div></div>
        <div class="group"><button id="clear-all-btn" class="btn-ghost btn-danger">پاک کردن همه</button></div>
        <div class="group"><div class="about-info"><div>Kaysan AI v4.0</div><div class="about-author">@ashkan_surii</div><div class="about-github"><a href="https://github.com/ashkansuri-13/kaysan-bot" target="_blank">GitHub</a> | <a href="/admin.html" target="_blank">داشبورد</a></div></div></div>
      </div>
    </aside>

    <div id="sidebar-backdrop" class="backdrop"></div>

    <main class="chat-area" id="chat-area">
      <div id="welcome-screen" class="welcome">
        <div class="welcome-icon"><img src="/logo.png" alt="Kaysan" class="welcome-logo"><div class="welcome-glow"></div></div>
        <h1 class="welcome-title">سلام <span id="welcome-name"></span>! 👋</h1>
        <p class="welcome-sub">من Kaysan AI هستم، دستیار هوشمند شما</p>
        <div id="personality-badge" class="badge">⚖️ متعادل</div>
        <div id="sentiment-badge" class="badge" style="display:none;background:var(--accent-soft);"></div>
        <div class="quick-grid">
          <button class="quick-card ripple" data-msg="سلام، حالت چطوره؟"><span class="quick-emoji">👋</span><span class="quick-text">سلام!</span></button>
          <button class="quick-card ripple" data-msg="یه لطیفه بگو"><span class="quick-emoji">😄</span><span class="quick-text">لطیفه</span></button>
          <button class="quick-card ripple" data-msg="یه پیشنهاد بده"><span class="quick-emoji">💡</span><span class="quick-text">پیشنهاد</span></button>
          <button class="quick-card ripple" data-msg="ترجمه کن: hello world"><span class="quick-emoji">🔄</span><span class="quick-text">ترجمه</span></button>
          <button class="quick-card ripple" data-msg="یه کد پایتون بنویس"><span class="quick-emoji">💻</span><span class="quick-text">کدنویسی</span></button>
          <button class="quick-card ripple" data-msg="وضعیت آب و هوای امروز"><span class="quick-emoji">🌤️</span><span class="quick-text">آب و هوا</span></button>
        </div>
      </div>
      <div id="messages" class="messages"></div>
      <div id="typing-indicator" class="typing hidden"><div class="typing-avatar"><img src="/logo.png" alt="Kaysan"></div><div class="typing-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>
    </main>

    <footer class="input-footer" id="input-footer">
      <div class="input-chrome glass">
        <div class="input-toolbar">
          <div class="model-pill"><select id="model-select" class="model-select"><option value="auto">🤖 خودکار</option><option value="chat">💬 چت</option><option value="code">💻 کد</option><option value="reason">🧠 استدلال</option></select></div>
          <div class="input-actions">
            <input type="file" id="file-input" style="display:none" accept="image/*,.pdf,.txt,.py,.js,.json">
            <button id="upload-btn" class="icon-btn-sm" title="آپلود فایل">📎</button>
            <button id="image-btn" class="icon-btn-sm" title="تصویر">🎨</button>
            <button id="emoji-btn" class="icon-btn-sm" title="ایموجی">😊</button>
          </div>
        </div>
        <div class="input-box">
          <button id="voice-btn" class="voice-btn" title="صدا"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
          <textarea id="msg-input" class="msg-input" rows="1" placeholder="پیام بنویسید..."></textarea>
          <button id="send-btn" class="send-btn ripple" disabled><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
        </div>
      </div>
    </footer>

    <div id="emoji-picker" class="emoji-picker hidden"><div class="emoji-search"><input type="text" id="emoji-search-input" placeholder="جستجو..."></div><div id="emoji-grid" class="emoji-grid"></div></div>
    <div id="toast" class="toast hidden"></div>
    <div id="voice-overlay" class="voice-overlay hidden"><div class="voice-content"><div class="voice-waveform" id="voice-waveform"></div><div class="voice-timer" id="voice-timer">00:00</div><div class="voice-actions"><button id="voice-cancel" class="voice-action-btn">لغو</button><button id="voice-send" class="voice-action-btn voice-send-btn">ارسال</button></div></div></div>
  </div>
  <script src="app.js?v=400"></script>
</body>
</html>
